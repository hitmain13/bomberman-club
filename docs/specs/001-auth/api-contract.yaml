openapi: 3.1.0
info:
  title: 001-auth
  version: "1.0.0"
paths:
  /auth/register:
    post:
      summary: Cria conta nova
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterInput" }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/AuthResponse" } } } }
        "409": { description: conflict }
        "422": { description: validation }
  /auth/login:
    post:
      summary: Autentica usuário
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginInput" }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/AuthResponse" } } } }
        "401": { description: invalid credentials }
  /auth/refresh:
    post:
      summary: Renova access token via refresh cookie
      tags: [auth]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/AuthResponse" } } } }
        "401": { description: missing/expired }
  /auth/logout:
    post:
      summary: Revoga sessão atual
      tags: [auth]
      responses:
        "200": { description: ok }
components:
  schemas:
    RegisterInput:
      type: object
      required: [username, email, password]
      properties:
        username: { type: string, minLength: 3, maxLength: 24 }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
    LoginInput:
      type: object
      required: [identifier, password]
      properties:
        identifier: { type: string }
        password: { type: string }
    AuthResponse:
      type: object
      required: [user, accessToken, expiresIn]
      properties:
        user: { $ref: "#/components/schemas/PrivateUser" }
        accessToken: { type: string }
        expiresIn: { type: integer }
    PrivateUser:
      type: object
      required: [id, username, email, role, bio, city, avatarUrl, createdAt]
      properties:
        id: { type: string }
        username: { type: string }
        email: { type: string }
        role: { type: string, enum: [USER, ADMIN] }
        bio: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"], format: uri }
        createdAt: { type: string, format: date-time }

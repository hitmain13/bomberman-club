services:
  postgres:
    image: postgres:16-alpine
    container_name: bomberman-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bomberman
      POSTGRES_PASSWORD: bomberman
      POSTGRES_DB: bomberman
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bomberman -d bomberman"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bomberman-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: bomberman-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bomberman
      MINIO_ROOT_PASSWORD: bomberman
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: bomberman-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 bomberman bomberman;
      mc mb -p local/bomberman-uploads || true;
      mc anonymous set download local/bomberman-uploads;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:

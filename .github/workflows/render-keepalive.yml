name: Render Keep Alive

on:
  schedule:
    # GitHub Actions só permite intervalo mínimo de 5 min por expressão cron.
    # Cinco schedules defasados em 1 min cobrem ping a cada minuto.
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 * * * *"
    - cron: "1,6,11,16,21,26,31,36,41,46,51,56 * * * *"
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"
    - cron: "4,9,14,19,24,29,34,39,44,49,54,59 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health
        run: curl -sf --max-time 30 "${API_HEALTH_URL:-https://bomberman-api-s4ix.onrender.com/health}"
        env:
          API_HEALTH_URL: ${{ secrets.API_HEALTH_URL }}

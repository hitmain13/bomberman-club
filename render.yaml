services:
  - type: web
    name: bomberman-api
    env: docker
    plan: free
    region: oregon
    rootDir: .
    dockerfilePath: apps/api/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3333"
      - key: LOG_LEVEL
        value: info
      - key: COOKIE_SECURE
        value: "true"
      - key: JWT_ACCESS_TTL_SECONDS
        value: "900"
      - key: JWT_REFRESH_TTL_DAYS
        value: "30"
      - key: API_BASE_URL
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_DOMAIN
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false
